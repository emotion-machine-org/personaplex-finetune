name: Feature request
description: Suggest a new training recipe, eval, pipeline step, or UI change.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, and why does it matter?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope (check all that apply)
      options:
        - label: Training (`moshi-finetune/`)
        - label: Inference (`personaplex/moshi/`)
        - label: Pipeline (`pipeline/`)
        - label: Client UI (`personaplex/client/`)
        - label: Docs / configs / other
